server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lcb_interview?useUnicode=true&characterEncoding=utf-8&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  threads:
    virtual:
      enabled: true

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.lcbinterview: info
    com.baomidou.mybatisplus: warn

admin:
  token: ${ADMIN_TOKEN:dev-admin-token-change-me}

ai:
  interview:
    enabled: ${AI_INTERVIEW_ENABLED:true}
    timeout-ms: ${AI_INTERVIEW_TIMEOUT_MS:8000}
  deepseek:
    api-key: ${AI_OPENCODE_API_KEY:}
    model: ${AI_DEEPSEEK_MODEL:deepseek-v4-flash}
    url: ${AI_DEEPSEEK_URL:https://opencode.ai/zen/go/v1/chat/completions}
    # 1M 上下文 + max 模式
    max-tokens: 65536
    thinking-tokens: 32768
