    api-key: sk-Lz3bHKegKd6FR6F7kooQvVsWI9X7E93HTdwZirsy2Mb1IvrDj7wejHUovTbSU9fk
    model: deepseek-v4-flash
    url: https://opencode.ai/zen/go/v1/chat/completions
