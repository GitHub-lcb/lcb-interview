services:
  mysql:
    image: mysql:8.4
    container_name: lcb-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: lcb_interview
      MYSQL_USER: ${DB_USERNAME:-lcb}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max-connections=80
      - --innodb-buffer-pool-size=256M
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7.4-alpine
    container_name: lcb-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-128mb}
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: lcb-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      DB_URL: jdbc:mysql://mysql:3306/lcb_interview?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      DB_USERNAME: ${DB_USERNAME:-lcb}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      APP_AUTH_SECRET: ${APP_AUTH_SECRET:-dev-user-auth-secret-change-me}
      APP_AUTH_TOKEN_TTL_HOURS: ${APP_AUTH_TOKEN_TTL_HOURS:-168}
      AI_INTERVIEW_ENABLED: ${AI_INTERVIEW_ENABLED:-false}
      AI_INTERVIEW_TIMEOUT_MS: ${AI_INTERVIEW_TIMEOUT_MS:-8000}
      AI_OPENCODE_API_KEY: ${AI_OPENCODE_API_KEY:-}
      AI_DEEPSEEK_MODEL: ${AI_DEEPSEEK_MODEL:-deepseek-v4-pro}
      AI_DEEPSEEK_URL: ${AI_DEEPSEEK_URL:-https://opencode.ai/zen/go/v1/chat/completions}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx768m -XX:+ExitOnOutOfMemoryError}

  frontend:
    build:
      context: ./frontend
    container_name: lcb-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  redis_data:
